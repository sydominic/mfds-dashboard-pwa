services:
  - type: web
    name: kmfds-information-dashboard
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "bash start.sh"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.15
      - key: AUTO_COLLECT_ON_LOAD
        value: "false"
      - key: DATABASE_URL
        sync: false
